<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text-to-Flashcard Generator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #1a1a1a;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .demo-badge {
      display: none;
      background: #534AB7;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
    }

    .demo-badge.visible {
      display: inline-block;
    }

    /* Input card */
    .input-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-size: 0.875rem;
      font-weight: 600;
      color: #444;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      resize: vertical;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 0.75rem;
      font-family: inherit;
      font-size: 0.9rem;
      color: #1a1a1a;
      background: #fafafa;
      transition: border-color 0.15s;
      line-height: 1.5;
    }

    textarea:focus {
      outline: none;
      border-color: #534AB7;
      background: #fff;
    }

    input[type="number"],
    input[type="password"] {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 0.55rem 0.75rem;
      font-family: inherit;
      font-size: 0.9rem;
      color: #1a1a1a;
      background: #fafafa;
      transition: border-color 0.15s;
      width: 100%;
    }

    input[type="number"] {
      max-width: 120px;
    }

    input[type="number"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #534AB7;
      background: #fff;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-row input[type="checkbox"] {
      accent-color: #534AB7;
      width: 1rem;
      height: 1rem;
      cursor: pointer;
    }

    .checkbox-row span {
      font-size: 0.875rem;
      color: #444;
      font-weight: 500;
    }

    /* API key field wrapper */
    #apiKeyField {
      transition: opacity 0.2s;
    }

    #apiKeyField.hidden {
      display: none;
    }

    /* Generate button */
    .btn-generate {
      background: #534AB7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1.4rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      align-self: flex-start;
    }

    .btn-generate:hover:not(:disabled) {
      background: #4540a0;
    }

    .btn-generate:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Loading indicator */
    .loading {
      display: none;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.25rem;
    }

    .loading.visible {
      display: flex;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #534AB7;
      border-radius: 50%;
      animation: bounce 1.1s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1;   }
    }

    /* Error message */
    .error-msg {
      display: none;
      background: #fff0f0;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.875rem;
      color: #b91c1c;
    }

    .error-msg.visible {
      display: block;
    }

    /* ─── Card display ─── */
    #cardDisplay {
      display: none;
    }

    #cardDisplay.visible {
      display: block;
    }

    /* Flip card */
    .card-container {
      width: 100%;
      max-width: 560px;
      height: 220px;
      perspective: 1000px;
      cursor: pointer;
      margin: 0 auto;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.5s ease;
    }

    .card-container.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }

    .card-front {
      background: #ffffff;
      border: 1px solid #e5e5e5;
    }

    .card-back {
      background: #EEEDFE;
      color: #26215C;
      transform: rotateY(180deg);
    }

    .card-question {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.5;
    }

    .card-hint {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: #999;
      letter-spacing: 0.02em;
    }

    .card-answer {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #26215C;
    }

    /* Navigation */
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.25rem;
    }

    .btn-nav {
      background: transparent;
      border: 1px solid #534AB7;
      color: #534AB7;
      border-radius: 8px;
      padding: 0.45rem 1rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      min-width: 90px;
    }

    .btn-nav:hover:not(:disabled) {
      background: #534AB7;
      color: #fff;
    }

    .btn-nav:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .card-counter {
      font-size: 0.875rem;
      color: #666;
      font-weight: 500;
      min-width: 80px;
      text-align: center;
    }

    /* Progress dots */
    .progress-dots {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .progress-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 2px solid #534AB7;
      background: transparent;
      transition: background 0.2s;
      display: inline-block;
    }

    .progress-dot.active {
      background: #534AB7;
    }

    /* Start over */
    .btn-start-over {
      display: block;
      margin: 1.5rem auto 0;
      background: transparent;
      border: none;
      color: #999;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .btn-start-over:hover {
      color: #534AB7;
    }

    .section-gap {
      margin-top: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>Text-to-Flashcard Generator</h1>
      <span class="demo-badge" id="demoBadge">Demo mode</span>
    </div>

    <!-- Input section -->
    <div id="inputSection">
      <div class="input-card">
        <div class="field">
          <label for="sourceText">Source text or topic</label>
          <textarea
            id="sourceText"
            placeholder="Paste any text, notes, or just a topic — e.g. 'The French Revolution'"
          ></textarea>
        </div>

        <div class="field">
          <label for="numCards">Number of cards</label>
          <input
            type="number"
            id="numCards"
            min="3"
            max="10"
            value="5"
          />
        </div>

        <div class="field" id="apiKeyField">
          <label for="apiKey">Claude API key</label>
          <input
            type="password"
            id="apiKey"
            placeholder="sk-ant-..."
          />
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="demoMode" />
          <span>Demo mode (no API key needed)</span>
        </label>

        <div>
          <button class="btn-generate" id="generateBtn" onclick="handleGenerate()">
            Generate flashcards
          </button>
          <div class="loading" id="loading">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>

        <div class="error-msg" id="errorMsg"></div>
      </div>
    </div>

    <!-- Card display section -->
    <div id="cardDisplay">
      <div class="card-container" id="cardContainer" onclick="flipCard()">
        <div class="card-inner">
          <div class="card-front">
            <div class="card-question" id="cardQuestion"></div>
            <div class="card-hint">Click to reveal answer</div>
          </div>
          <div class="card-back">
            <div class="card-answer" id="cardAnswer"></div>
          </div>
        </div>
      </div>

      <div class="nav-row">
        <button class="btn-nav" id="prevBtn" onclick="navigate(-1)">Previous</button>
        <span class="card-counter" id="cardCounter"></span>
        <button class="btn-nav" id="nextBtn" onclick="navigate(1)">Next</button>
      </div>

      <div class="progress-dots" id="progressDots"></div>

      <button class="btn-start-over" onclick="startOver()">Start over</button>
    </div>
  </div>

  <script>
    const MOCK_CARDS = [
      {
        question: "What is photosynthesis?",
        answer: "The process by which plants use sunlight, water, and CO2 to produce glucose and oxygen."
      },
      {
        question: "What is the powerhouse of the cell?",
        answer: "The mitochondria — it produces ATP through cellular respiration."
      },
      {
        question: "What is Newton's second law of motion?",
        answer: "Force equals mass times acceleration: F = ma."
      },
      {
        question: "What is the difference between DNA and RNA?",
        answer: "DNA is double-stranded and stores genetic information. RNA is single-stranded and helps translate that information into proteins."
      },
      {
        question: "What is the speed of light?",
        answer: "Approximately 299,792,458 metres per second (roughly 3 × 10⁸ m/s) in a vacuum."
      }
    ];

    let cards = [];
    let currentIndex = 0;

    // DOM references
    const demoModeCheckbox = document.getElementById('demoMode');
    const apiKeyField      = document.getElementById('apiKeyField');
    const demoBadge        = document.getElementById('demoBadge');
    const generateBtn      = document.getElementById('generateBtn');
    const loading          = document.getElementById('loading');
    const errorMsg         = document.getElementById('errorMsg');
    const inputSection     = document.getElementById('inputSection');
    const cardDisplay      = document.getElementById('cardDisplay');
    const cardContainer    = document.getElementById('cardContainer');
    const cardQuestion     = document.getElementById('cardQuestion');
    const cardAnswer       = document.getElementById('cardAnswer');
    const cardCounter      = document.getElementById('cardCounter');
    const progressDots     = document.getElementById('progressDots');
    const prevBtn          = document.getElementById('prevBtn');
    const nextBtn          = document.getElementById('nextBtn');

    demoModeCheckbox.addEventListener('change', () => {
      const isDemo = demoModeCheckbox.checked;
      apiKeyField.classList.toggle('hidden', isDemo);
      demoBadge.classList.toggle('visible', isDemo);
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function clearError() {
      errorMsg.textContent = '';
      errorMsg.classList.remove('visible');
    }

    function setLoading(on) {
      generateBtn.disabled = on;
      generateBtn.textContent = on ? 'Generating...' : 'Generate flashcards';
      loading.classList.toggle('visible', on);
    }

    async function handleGenerate() {
      clearError();

      const text    = document.getElementById('sourceText').value.trim();
      const numCards = parseInt(document.getElementById('numCards').value, 10);
      const isDemo  = demoModeCheckbox.checked;
      const apiKey  = document.getElementById('apiKey').value.trim();

      if (!text) {
        showError('Please enter some text or a topic to generate cards from.');
        return;
      }

      if (!isDemo && !apiKey) {
        showError('Please enter your API key or enable Demo mode.');
        return;
      }

      setLoading(true);

      try {
        if (isDemo) {
          await new Promise(resolve => setTimeout(resolve, 1200));
          loadCards(MOCK_CARDS.slice(0, numCards));
        } else {
          await generateFromAPI(text, numCards, apiKey);
        }
      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        setLoading(false);
      }
    }

    async function generateFromAPI(text, numCards, apiKey) {
      const prompt = `Generate ${numCards} flashcards based on the text below.

Rules:
- Each question must test a single, specific concept
- Answers must be concise (1–3 sentences maximum)
- Do not number the questions
- Return ONLY a valid JSON array — no explanation, no markdown, no code fences
- Each item must have exactly two keys: "question" and "answer"

Example of the required format:
[{"question": "What is X?", "answer": "X is Y."}]

Text:
${text}`;

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!response.ok) {
        throw new Error(`API error ${response.status} — Check your API key and try again.`);
      }

      const data = await response.json();
      const raw = data.content[0].text;

      // Strip markdown code fences if present
      const cleaned = raw.replace(/```(?:json)?\s*/gi, '').replace(/```/g, '').trim();

      let parsed;
      try {
        parsed = JSON.parse(cleaned);
      } catch {
        throw new Error("Couldn't parse the response. Try again or switch to Demo mode.");
      }

      loadCards(parsed);
    }

    function loadCards(data) {
      cards = data;
      currentIndex = 0;
      inputSection.style.display = 'none';
      cardDisplay.classList.add('visible');
      showCard(0);
    }

    function showCard(index) {
      // Remove flipped so card starts on question side
      cardContainer.classList.remove('flipped');

      cardQuestion.textContent = cards[index].question;
      cardAnswer.textContent   = cards[index].answer;

      cardCounter.textContent = `Card ${index + 1} of ${cards.length}`;

      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === cards.length - 1;

      renderDots(index);
    }

    function renderDots(activeIndex) {
      progressDots.innerHTML = '';
      cards.forEach((_, i) => {
        const dot = document.createElement('span');
        dot.className = 'progress-dot' + (i === activeIndex ? ' active' : '');
        progressDots.appendChild(dot);
      });
    }

    function flipCard() {
      cardContainer.classList.toggle('flipped');
    }

    function navigate(direction) {
      const next = currentIndex + direction;
      if (next < 0 || next >= cards.length) return;
      currentIndex = next;
      showCard(currentIndex);
    }

    function startOver() {
      cards = [];
      currentIndex = 0;
      cardDisplay.classList.remove('visible');
      inputSection.style.display = '';
      cardContainer.classList.remove('flipped');
      clearError();
    }
  </script>
</body>
</html>
